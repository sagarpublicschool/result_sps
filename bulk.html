<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* Exact Interface Styling as per your screenshot */
body { font-family: 'Times New Roman', serif; background-color: #008000; margin: 0; padding: 0; }
.top-header { background-color: #FFA500; color: #000; text-align: center; padding: 20px 10px; border-bottom: 2px solid #0056b3; }
#search-box { max-width: 500px; margin: 40px auto; background: #C0C0C0; padding: 10px; border: 2px solid #333; text-align: center; }
.search-inner { background: #fff; padding: 20px; border: 1px solid #999; }
.input-row { display: flex; margin-bottom: 10px; border: 1px solid #999; }
.input-row label { background: #E0E0E0; padding: 10px; width: 120px; text-align: left; border-right: 1px solid #999; font-weight: bold; }
.input-row select { border: none; padding: 10px; flex: 1; outline: none; font-size: 16px; background: #fff; }
.check-btn { background: #5D9CEC; color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 2px; }

/* Marksheet Design */
.m-container { 
    display: none; /* Initially hidden */
    width: 800px; 
    margin: 20px auto; 
    background: #fff; 
    box-sizing: border-box; 
    padding: 30px; 
    border: 15px solid transparent;
    border-image-source: url('https://www.transparenttextures.com/patterns/cubes.png'); 
    border-image-slice: 30;
    border-image-repeat: round;
    outline: 2px solid #333; 
    outline-offset: -10px;
    box-shadow: 0 0 0 2px #333; 
    page-break-after: always; 
}

table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 13px; }
.yellow-bar { background: #FFEA00 !important; font-weight: bold; }
.info-table { border: none; margin-bottom: 15px; }
.info-table td { border: none; text-align: left; padding: 5px 0; font-size: 14px; }
.photo-wrap { width: 110px; height: 130px; border: 1px solid #000; background: #f0f0f0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.photo-img { max-width: 100%; max-height: 100%; object-fit: contain; }
.footer-signs { margin-top: 40px; display: flex; justify-content: space-between; font-weight: bold; font-size: 12px; }

@media print { 
    body { background-color: #fff !important; }
    #search-box, .top-header, .bottom-footer { display: none !important; } 
    .m-container { display: block !important; margin: 0 auto !important; border: 2px solid #000 !important; width: 100% !important; }
}
</style>
</head>
<body>

<div class="top-header">
    <h1>Bulk Marksheet Generator</h1>
    <p>SAGAR PUBLIC SCHOOL - Barsoi, Katihar</p>
</div>

<div id="search-box">
    <div class="search-inner">
        <h3>Select Class for Bulk Print</h3>
        <div class="input-row">
            <label>Select Class:</label>
            <select id="cls">
                <option value="">-- Select Class --</option>
                <option value="1">Class 1</option>
                <option value="2">Class 2</option>
                <option value="3">Class 3</option>
                <option value="4">Class 4</option>
                <option value="5">Class 5</option>
                <option value="6">Class 6</option>
                <option value="7">Class 7</option>
                <option value="8">Class 8</option>
                <option value="9">Class 9</option>
                <option value="10">Class 10</option>
            </select>
        </div>
        <button id="load-btn" class="check-btn" onclick="loadBulk()">Generate All Marksheets</button>
        
        <div id="print-controls" style="display:none; margin-top:15px;">
            <button class="check-btn" style="background:#008000; margin-bottom:5px;" onclick="window.print()">Print / Save PDF</button>
            <button class="check-btn" style="background:#666;" onclick="location.reload()">Reset</button>
        </div>
    </div>
</div>

<div id="bulk-output"></div>

<script>
    // Apni Apps Script URL yahan dalein
    const API_URL = "https://script.google.com/macros/s/AKfycbxIduRaZeIqj_qypLgefLM13wNLQ8xXxLqV6hB4AlHazyzNo87JNHKD3irFNL1vGMAN/exec"; 

    function loadBulk() {
        var c = document.getElementById('cls').value;
        if(!c) return Swal.fire('Error', 'Please select a class!', 'warning');
        
        const btn = document.getElementById('load-btn');
        btn.innerText = "Connecting to Database...";
        btn.disabled = true;

        // action matches your code.gs update
        fetch(`${API_URL}?action=getAllResults&className=${c}`)
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.innerText = "Generate All Marksheets";
                
                if(!data || data === "Not Found" || data.length === 0) {
                    Swal.fire('No Data', 'Sheet "'+c+'" me koi data nahi mila.', 'info');
                } else {
                    renderMarksheets(data);
                    document.getElementById('print-controls').style.display = 'block';
                    document.getElementById('search-box').style.display = 'none';
                }
            })
            .catch(e => {
                btn.disabled = false;
                Swal.fire('Error', 'Connection Error! Check internet or Script URL.', 'error');
            });
    }

    function renderMarksheets(students) {
        let html = "";
        students.forEach(d => {
            let marksRows = "";
            d.subjects.forEach(s => {
                let sStatus = (Number(s.m[6]) < 30) ? "FAIL" : "PASS"; 
                marksRows += `<tr>
                    <td style="text-align:left; padding-left:10px;">${s.n}</td>
                    <td>${s.m[0]}</td><td>${s.m[1]}</td><td>${s.m[2]}</td>
                    <td>${s.m[3]}</td><td>${s.m[4]}</td><td>${s.m[5]}</td><td>${s.m[6]}</td>
                    <td style="font-weight:bold; color:${sStatus=='PASS'?'green':'red'};">${sStatus}</td>
                </tr>`;
            });

            html += `
            <div class="m-container" style="display:block;">
                <div style="text-align: center; position: relative; border-bottom: 2px solid #000; padding-bottom:10px;">
                    <img src="https://drive.google.com/thumbnail?id=1pWEjzAU2G4AUC0RhIJ8cMHdLtLvQ4YJe&sz=w300" style="position: absolute; left: 0; top: 0; width: 90px;">
                    <h1 style="color: #3e7d58; margin: 0; font-size: 32px;">SAGAR PUBLIC SCHOOL</h1>
                    <div style="font-size: 11px; font-weight: bold;">QUAZITOLA, BARSOI, KATIHAR, BIHAR 855102</div>
                    <div style="background:#43515e; color:white; padding:5px; margin-top:10px; font-weight:bold; text-transform:uppercase;">
                        2nd TERMINAL REPORT CARD 2025-26
                    </div>
                </div>

                <table class="info-table">
                    <tr>
                        <td width="130"><b>Student Name:</b></td><td>${d.name}</td>
                        <td rowspan="4" width="120" style="text-align:right;">
                            <div class="photo-wrap" style="float:right;"><img src="${d.photo}" class="photo-img"></div>
                        </td>
                    </tr>
                    <tr><td><b>Father's Name:</b></td><td>${d.father}</td></tr>
                    <tr><td><b>Roll / Reg No:</b></td><td>${d.rollNo} / ${d.regNo}</td></tr>
                    <tr><td><b>Class (Section):</b></td><td>${d.classFromSheet} (${d.section || 'A'})</td></tr>
                </table>

                <table>
                    <tr class="yellow-bar">
                        <th rowspan="2">SUBJECT</th><th colspan="3">MAX MARKS</th><th colspan="4">MARKS OBTAINED</th><th rowspan="2">STATUS</th>
                    </tr>
                    <tr class="yellow-bar"><th>TH</th><th>PR</th><th>TOT</th><th>AS</th><th>TH</th><th>PR</th><th>TOTAL</th></tr>
                    ${marksRows}
                    <tr class="yellow-bar">
                        <td>TOTAL</td><td></td><td></td><td>${d.gtMax}</td><td></td><td></td><td></td><td>${d.gtObt}</td><td>${d.status}</td>
                    </tr>
                </table>

                <div style="margin-top:15px; font-weight:bold; font-size:16px; border:1px solid #000; padding:5px; display:inline-block;">
                    OVERALL GRADE: ${d.overallGrade || 'N/A'}
                </div>

                <div class="footer-signs">
                    <div style="text-align:center;"><br>Parent's Signature</div>
                    <div style="text-align:center;"><img src="https://drive.google.com/thumbnail?id=1EpjUL_k0w78HXZeV9G4t5SP5trVYs5yO" style="height:45px;"><br>Director</div>
                    <div style="text-align:center;"><img src="https://drive.google.com/thumbnail?id=1vTb3S-C3LCLUUkDg2X32tPYFGRcj23t_" style="height:45px;"><br>Principal</div>
                </div>
            </div>`;
        });
        document.getElementById('bulk-output').innerHTML = html;
    }
</script>
</body>
</html>
