<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* Interface Design - No changes to your previous style */
body { font-family: 'Times New Roman', serif; background-color: #008000; margin: 0; padding-top: 50px; }
.top-header { background-color: #FFA500; color: #000; text-align: center; padding: 15px; border-bottom: 3px solid #0056b3; }
#search-box { max-width: 500px; margin: 30px auto; background: #C0C0C0; padding: 15px; border: 2px solid #333; text-align: center; }
.search-inner { background: #fff; padding: 20px; border: 1px solid #333; }
.input-row { display: flex; margin-bottom: 10px; border: 1px solid #333; }
.input-row label { background: #E0E0E0; padding: 8px; width: 120px; text-align: left; border-right: 1px solid #333; font-weight: bold; }
.input-row select, .input-row input { border: none; padding: 8px; flex: 1; outline: none; font-size: 16px; }
.check-btn { background: #5D9CEC; color: white; border: 1px solid #fff; padding: 10px 25px; cursor: pointer; font-weight: bold; margin-top: 10px; border-radius: 4px; width: 100%; }

/* Result Container */
.m-container { 
    display: block; 
    width: 800px; 
    margin: 20px auto; 
    background: #fff; 
    box-sizing: border-box; 
    padding: 30px; 
    border: 15px solid transparent;
    border-image-source: url('https://www.transparenttextures.com/patterns/cubes.png'); 
    border-image-slice: 30;
    border-image-repeat: round;
    outline: 2px solid #333; 
    outline-offset: -10px;
    box-shadow: 0 0 0 2px #333; 
    page-break-after: always; 
}

table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
th, td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 13px; }
.yellow-bar { background: #FFEA00 !important; font-weight: bold; }
.info-table { border: none; margin-bottom: 15px; table-layout: auto !important; width: 100%; }
.info-table td { border: none; text-align: left; padding: 5px 0; font-size: 14px; vertical-align: middle; }
.label-cell { font-weight: bold; width: 130px; } 
.value-cell { padding-left: 5px !important; } 
.photo-wrap { width: 110px; height: 130px; border: 1px solid #000; background: #f0f0f0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.photo-img { max-width: 100%; max-height: 100%; object-fit: contain; }
.note-section { font-size: 11px; text-align: justify; margin-top: 15px; border-top: 1px solid #000; padding-top: 10px; }
.footer-signs { margin-top: 40px; display: flex; justify-content: space-between; font-weight: bold; font-size: 12px; align-items: flex-end; }
.bottom-footer { background-color: #FFA500; color: #000; text-align: center; padding: 15px; font-size: 13px; margin-top: 50px; }

@media print { 
    body { background-color: #fff !important; padding-top: 0 !important; }
    .top-header, #search-box, .bottom-footer, .print-btn-div { display: none !important; } 
    .m-container { margin: 0 auto !important; border: 2px solid #000 !important; width: 100% !important; }
}
</style>
</head>
<body>

<div class="top-header" id="ui-header">
    <h1>Bulk Marksheets Generator</h1>
    <p>SAGAR PUBLIC SCHOOL - Barsoi, Katihar</p>
</div>

<div id="search-box">
    <div class="search-inner">
        <h3 style="margin-top:0;">Select Class for Bulk Print</h3>
        <div class="input-row">
            <label>Select Class:</label>
            <select id="cls">
                <option value="">-- Select Class --</option>
                <option value="1st">Class 1</option>
                <option value="2nd">Class 2</option>
                <option value="3rd">Class 3</option>
                <option value="4th">Class 4</option>
                <option value="5th">Class 5</option>
                <option value="6th">Class 6</option>
                <option value="7th">Class 7</option>
                <option value="8th">Class 8</option>
                <option value="9th">Class 9</option>
                <option value="10th">Class 10</option>
            </select>
        </div>
        <button id="load-btn" class="check-btn" onclick="loadBulk()">Load All Marksheets</button>
        
        <div id="print-controls" style="display:none; margin-top:15px;">
            <button class="check-btn" style="background:#008000;" onclick="window.print()">Print / Save PDF</button>
            <button class="check-btn" style="background:#666;" onclick="location.reload()">Back / Reset</button>
        </div>
    </div>
</div>

<div id="bulk-output"></div>

<div class="bottom-footer" id="ui-footer">
    Developed by: Riyaz Ahmad, PGT Zoology
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwQK11AtmVGhs_tLKU8ua8lUfxugT3e1PzvCkBzbOcX8aAdypDS3pLSH5lDbuUUWX5E/exec"; 

    function loadBulk() {
        var c = document.getElementById('cls').value;
        if(!c) return Swal.fire('Error', 'Please select a class!', 'warning');
        
        const btn = document.getElementById('load-btn');
        btn.innerText = "Processing Bulk Results...";
        btn.disabled = true;

        Swal.fire({
            title: 'Fetching Data...',
            text: 'Please wait while we load all results.',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });
        
        // Result ke liye action "getAllResults" use kiya gaya hai
        fetch(`${API_URL}?action=getAllResults&className=${c}`)
            .then(res => res.json())
            .then(data => {
                Swal.close();
                btn.innerText = "Load All Marksheets";
                btn.disabled = false;
                
                if(data !== "Not Found" && Array.isArray(data)) {
                    generateResultHTML(data);
                    document.getElementById('print-controls').style.display = 'block';
                    document.getElementById('search-box').style.display = 'none'; // Optional: hide search box after load
                    document.getElementById('ui-footer').style.display = 'none';
                    document.body.style.backgroundColor = "#fff";
                } else {
                    Swal.fire('Error', 'No results found for this class!', 'error');
                }
            })
            .catch(e => {
                Swal.close();
                Swal.fire('Error', 'API Error or Network issue!', 'error');
                btn.disabled = false;
            });
    }

    function generateResultHTML(studentsArray) {
        let bulkHTML = "";
        
        studentsArray.forEach(d => {
            let marksRows = "";
            d.subjects.forEach(s => {
                let sStatus = (Number(s.m[6]) < 33) ? "FAIL" : "PASS"; 
                let sColor = (sStatus === "FAIL") ? "red" : "green";
                marksRows += `<tr>
                    <td style="text-align:left; padding-left:10px;">${s.n}</td>
                    <td>${s.m[0]}</td><td>${s.m[1]}</td><td>${s.m[2]}</td>
                    <td>${s.m[3]}</td><td>${s.m[4]}</td><td>${s.m[5]}</td><td>${s.m[6]}</td>
                    <td style="color:${sColor}; font-weight:bold;">${sStatus}</td>
                </tr>`;
            });

            let per = d.gtMax > 0 ? ((d.gtObt / d.gtMax) * 100).toFixed(2) : "0";

            bulkHTML += `
            <div class="m-container">
                <div style="text-align: center; position: relative; padding-bottom: 5px; margin-bottom: 10px; border-bottom: 1px solid #000;">
                    <img src="https://drive.google.com/thumbnail?id=1pWEjzAU2G4AUC0RhIJ8cMHdLtLvQ4YJe&sz=w300" style="position: absolute; left: 0; top: 0; width: 95px; height: auto;">
                    <h1 style="color: #3e7d58; font-size: 38px; font-weight: bold; margin: 0; font-family: Arial, sans-serif;">SAGAR PUBLIC SCHOOL</h1>
                    <div style="color: #3e7d58; font-size: 13px; font-weight: bold; margin: 2px 0;">EDUCATIONAL & WELFARE TRUST</div>
                    <div style="font-size: 11px; font-weight: bold; line-height: 1.3; color: #000;">
                        QUAZITOLA, BARSOI, KATIHAR, BIHAR 855102<br>
                        RTE Registration no:- 21211472023218114225 | UDISE Code :- 10101122703
                    </div>
                    <div style="background-color: #43515e; color: white; padding: 7px; font-size: 17px; font-weight: bold; margin-top: 15px; text-transform: uppercase;">
                        2<sup>nd</sup> TERMINAL REPORT CARD 2025 - 26
                    </div>
                </div>

                <table class="info-table">
                    <tr>
                        <td class="label-cell">Registration No:</td><td class="value-cell">${d.regNo}</td>
                        <td style="width:20px;"></td><td class="label-cell">Roll No:</td><td class="value-cell">${d.rollNo}</td>
                        <td rowspan="5" style="width: 130px; text-align: right;"><div class="photo-wrap"><img src="${d.photo || ''}" class="photo-img"></div></td>
                    </tr>
                    <tr><td class="label-cell">Student Name:</td><td class="value-cell">${d.name}</td><td></td><td class="label-cell">Class:</td><td class="value-cell"><b>${d.classFromSheet}</b></td></tr>
                    <tr><td class="label-cell">Father's Name:</td><td class="value-cell">${d.father}</td><td></td><td class="label-cell">Section:</td><td class="value-cell">${d.section || "-"}</td></tr>
                    <tr><td class="label-cell">Mother's Name:</td><td class="value-cell">${d.mother || "-"}</td><td></td><td class="label-cell">Date of Birth:</td><td class="value-cell">${d.dob || "-"}</td></tr>
                    <tr><td class="label-cell">Exam Centre:</td><td colspan="4" class="value-cell">${d.center}</td></tr>
                </table>

                <table>
                    <thead>
                        <tr class="yellow-bar"><th rowspan="2" style="width:30%">SUBJECT</th><th colspan="3">MAX MARKS</th><th colspan="4">MARKS OBTAINED</th><th rowspan="2">STATUS</th></tr>
                        <tr class="yellow-bar"><th>TH</th><th>PR</th><th>TOT</th><th>AS</th><th>TH</th><th>PR</th><th>TOTAL</th></tr>
                    </thead>
                    <tbody>${marksRows}</tbody>
                    <tfoot>
                        <tr class="yellow-bar"><td>TOTAL</td><td></td><td></td><td>${d.gtMax}</td><td></td><td></td><td></td><td>${d.gtObt}</td><td style="color:${d.sColor}">${d.status}</td></tr>
                    </tfoot>
                </table>

                <div style="margin-top:15px; font-weight:bold; font-size:14px;">
                    OVERALL PERCENTAGE:- ${per}% &nbsp;&nbsp;&nbsp; OVERALL GRADE:- ${d.status}
                </div>

                <div class="note-section"><b>NOTE:</b> 1. Provisional result. 2. Star (*) marks pass with concession.</div>

                <div class="footer-signs">
                    <div style="text-align:center;">Signature of Parents</div>
                    <div style="text-align:center;"><img src="https://drive.google.com/thumbnail?id=1EpjUL_k0w78HXZeV9G4t5SP5trVYs5yO" style="height:45px;"><br>Director's Signature</div>
                    <div style="text-align:center;"><img src="https://drive.google.com/thumbnail?id=1vTb3S-C3LCLUUkDg2X32tPYFGRcj23t_" style="height:45px;"><br>Principal's Signature</div>
                </div>
            </div>`;
        });
        
        document.getElementById('bulk-output').innerHTML = bulkHTML;
    }
</script>
</body>
</html>
